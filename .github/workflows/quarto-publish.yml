name: Quarto Publish

on:
  push:
    branches:
      - dev-flavio-blog # Triggers whenever you push to your working branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to write the rendered HTML back to your repo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}